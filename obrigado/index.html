<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado! - Combine e Cole</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --primary-light: #ECFDF5;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            padding: 50px 30px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Checkmark Animado CSS */
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
        }

        .check-icon {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: 50%;
            border: 4px solid var(--primary);
        }

        .icon-line {
            height: 5px;
            background-color: var(--primary);
            display: block;
            border-radius: 2px;
            position: absolute;
            z-index: 10;
        }

        .line-tip {
            top: 46px;
            left: 14px;
            width: 25px;
            transform: rotate(45deg);
            animation: icon-line-tip 0.75s;
        }

        .line-long {
            top: 38px;
            right: 8px;
            width: 47px;
            transform: rotate(-45deg);
            animation: icon-line-long 0.75s;
        }

        @keyframes icon-line-tip {
            0% {
                width: 0;
                left: 1px;
                top: 19px;
            }

            100% {
                width: 25px;
                left: 14px;
                top: 46px;
            }
        }

        @keyframes icon-line-long {
            0% {
                width: 0;
                right: 46px;
                top: 54px;
            }

            100% {
                width: 47px;
                right: 8px;
                top: 38px;
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 24px 32px;
            border-radius: 20px;
            font-weight: 800;
            width: 100%;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            margin-bottom: 24px;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.4);
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #F1F5F9;
            color: #475569;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 700;
            width: 100%;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-whatsapp:hover {
            background: #E2E8F0;
        }

        #status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="success-checkmark">
            <div class="check-icon">
                <span class="icon-line line-tip"></span>
                <span class="icon-line line-long"></span>
            </div>
        </div>

        <h1>Compra Aprovada!</h1>
        <p class="subtitle">Seu material já está liberado. Clique no botão abaixo para começar agora mesmo!</p>

        <span id="status-text">Verificando seu acesso...</span>

        <button id="main-action-btn" class="btn-main" style="opacity: 0.6; pointer-events: none;">
            ACESSAR MEU MATERIAL
        </button>

        <a href="https://wa.me/55SEUNUMEROHERE?text=Olá,%20acabei%20de%20comprar%20o%20Combine%20e%20Cole%20e%20preciso%20de%20ajuda."
            class="btn-whatsapp">
            PRECISA DE AJUDA? CHAME NO WHATSAPP
        </a>
    </div>

    <script>
        // Verificação de acesso autorizado
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            const purchaseFlag = sessionStorage.getItem('purchase_initiated');

            // Se não tem email na URL (acesso direto ou link de email) 
            // E não veio de um clique no botão de compra nesta sessão, redireciona
            if (!emailParam && !purchaseFlag) {
                window.location.href = '../index.html';
            }
        })();

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const emailFromUrl = urlParams.get('email');
            const btn = document.getElementById('main-action-btn');
            const statusText = document.getElementById('status-text');

            // Função para liberar o botão
            function enableButton(url) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                btn.onclick = () => window.location.href = url;
                statusText.innerText = "Acesso localizado com sucesso! ✅";
            }

            // Função para pedir email se não houver na URL
            function askForEmail() {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                statusText.innerText = "Clique abaixo para liberar seu acesso";
                btn.onclick = () => {
                    const email = prompt("Qual o e-mail que você utilizou na compra?");
                    if (email) {
                        window.location.href = `https://www.combinetea.online/obrigado?email=${encodeURIComponent(email)}`;
                    }
                };
            }

            // Se o email na URL for o "código" da plataforma não traduzido (ex: [email], {email})
            const isTag = emailFromUrl && (emailFromUrl.includes('{') || emailFromUrl.includes('[') || emailFromUrl.includes('email'));

            if (!emailFromUrl || isTag) {
                askForEmail();
                return;
            }

            try {
                // Tenta buscar o token por 3 vezes (caso o webhook demore um pouquinho)
                let attempts = 0;
                let foundToken = null;

                while (attempts < 5 && !foundToken) {
                    const response = await fetch(`https://area-membros-nu.vercel.app/api/get-token?email=${encodeURIComponent(emailFromUrl)}`);
                    const data = await response.json();
                    if (data.token) {
                        foundToken = data.token;
                    } else {
                        attempts++;
                        await new Promise(r => setTimeout(r, 1500)); // Espera 1.5 seg
                    }
                }

                if (foundToken) {
                    enableButton(`https://area-membros-nu.vercel.app/?token=${foundToken}`);
                } else {
                    statusText.innerText = "Nenhum acesso pendente para este e-mail... ❌";
                    btn.innerText = "TENTAR COM OUTRO E-MAIL";
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                    btn.onclick = () => {
                        const email = prompt("Qual o e-mail que você utilizou na compra?");
                        if (email) {
                            window.location.href = `https://www.combinetea.online/obrigado?email=${encodeURIComponent(email)}`;
                        }
                    };
                }
            } catch (err) {
                console.error("Erro:", err);
                statusText.innerText = "Erro de conexão com o servidor... ⚠️";
                askForEmail();
            }
        }

        init();
    </script>
</body>

</html>
