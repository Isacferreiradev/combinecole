<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado! - Combine e Cole</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #E2E8F0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary);
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px 32px;
            border-radius: 16px;
            font-weight: 800;
            width: 100%;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
        }

        .btn-main:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #F1F5F9;
            color: #475569;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            display: block;
        }

        .error {
            color: #EF4444;
        }

        .success {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Compra Aprovada!</h1>
        <p class="subtitle">Informe seu e-mail de compra abaixo para liberar o seu material agora mesmo.</p>

        <div class="input-group">
            <label for="email-input">E-mail da Compra</label>
            <input type="email" id="email-input" placeholder="seuemail@exemplo.com">
        </div>

        <button id="verify-btn" class="btn-main">LIBERAR MEU ACESSO</button>

        <span id="status-msg"></span>

        <a href="https://wa.me/5521969836161" class="btn-whatsapp">PRECISA DE AJUDA? CHAME NO WHATSAPP</a>
    </div>

    <script>
        const btn = document.getElementById('verify-btn');
        const input = document.getElementById('email-input');
        const status = document.getElementById('status-msg');

        // Tenta pegar o email da URL se existir (conveniência)
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email') || urlParams.get('token');
        if (emailParam && emailParam.includes('@')) {
            input.value = emailParam;
        }

        btn.onclick = async () => {
            const email = input.value.trim();
            if (!email || !email.includes('@')) {
                status.innerText = "Por favor, digite um e-mail válido.";
                status.className = "error";
                return;
            }

            btn.disabled = true;
            btn.innerText = "VERIFICANDO...";
            status.innerText = "";

            try {
                // Busca o acesso no banco de dados
                const res = await fetch(`https://area-membros-nu.vercel.app/api/get-token?email=${encodeURIComponent(email)}&venda=${encodeURIComponent(email)}`);
                const data = await res.json();

                if (data.token) {
                    status.innerText = "Acesso localizado! Redirecionando...";
                    status.className = "success";
                    setTimeout(() => {
                        window.location.href = `https://area-membros-nu.vercel.app/?token=${data.token}`;
                    }, 1000);
                } else {
                    status.innerText = "Acesso não encontrado. Verifique o e-mail ou aguarde 1 minuto.";
                    status.className = "error";
                    btn.disabled = false;
                    btn.innerText = "LIBERAR MEU ACESSO";
                }
            } catch (e) {
                status.innerText = "Erro de conexão. Tente novamente.";
                status.className = "error";
                btn.disabled = false;
                btn.innerText = "LIBERAR MEU ACESSO";
            }
        };
    </script>
</body>

</html>
