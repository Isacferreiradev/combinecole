<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Liberado! - Combine e Cole</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --primary-light: #ECFDF5;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            padding: 50px 30px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-main {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 24px 32px;
            border-radius: 20px;
            font-weight: 800;
            width: 100%;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            margin-bottom: 24px;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #F1F5F9;
            color: #475569;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 700;
            width: 100%;
            font-size: 0.9rem;
        }

        #status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Compra Aprovada!</h1>
        <p class="subtitle">Seu material já está liberado. Clique no botão abaixo para começar agora mesmo!</p>
        <span id="status-text">Verificando seu acesso...</span>
        <button id="main-btn" class="btn-main" style="opacity: 0.5; pointer-events: none;">
            ACESSAR MEU MATERIAL
        </button>
        <a href="https://wa.me/55SEUNUMEROHERE" class="btn-whatsapp">DÚVIDAS? CHAME NO WHATSAPP</a>
    </div>

    <script>
        async function checkAccess() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || params.get('venda');
            const status = document.getElementById('status-text');
            const btn = document.getElementById('main-btn');

            if (!token) {
                status.innerText = "Aguardando confirmação de pagamento...";
                // Tenta buscar o acesso mais recente do banco (Busca Automática)
                const res = await fetch(`https://area-membros-nu.vercel.app/api/get-token`);
                const data = await res.json();
                if (data.recent_sales && data.recent_sales.length === 1) {
                    liberar(data.recent_sales[0].token);
                } else {
                    status.innerText = "Por favor, aguarde o redirecionamento ou informe seu e-mail no suporte.";
                }
                return;
            }

            try {
                // Tenta validar o token/venda por até 5 vezes
                let found = false;
                for (let i = 0; i < 6; i++) {
                    const res = await fetch(`https://area-membros-nu.vercel.app/api/get-token?venda=${token}`);
                    const data = await res.json();
                    if (data.token) {
                        liberar(data.token);
                        found = true;
                        break;
                    }
                    await new Promise(r => setTimeout(r, 2000));
                }
                if (!found) status.innerText = "Acesso ainda não identificado. Tente atualizar a página.";
            } catch (e) {
                status.innerText = "Erro ao conectar com o servidor.";
            }

            function liberar(userToken) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
                btn.onclick = () => window.location.href = `https://area-membros-nu.vercel.app/?token=${userToken}`;
                status.innerText = "Acesso liberado com sucesso! ✅";
            }
        }
        checkAccess();
    </script>
</body>

</html>
